<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixion Kiosk</title>
    <link rel="stylesheet" href="/static/css/style.css?v=10">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ══════════════════════════════════════════════
         SPLASH SCREEN
    ══════════════════════════════════════════════  -->
    <div id="splash-screen" class="screen active">
        <div class="overlay"></div>
        <video src="/static/images/promo.mp4" class="bg-media" autoplay loop muted playsinline></video>
        <div class="splash-content">
            <div class="splash-logo">MIXION</div>
            <p class="splash-sub">TOUCH ANYWHERE TO ORDER</p>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════
         MENU SCREEN
    ══════════════════════════════════════════════  -->
    <div id="menu-screen" class="screen">
        <div class="menu-layout">

            <!-- FIXED SIDEBAR -->
            <aside class="sidebar">
                <div class="sidebar-brand">🍹 Mixion</div>

                <!-- Scrollable nav inside sidebar -->
                <div class="sidebar-scroll">
                    <p class="nav-section-label">Category</p>
                    <nav id="sidebar-categories"></nav>

                    <div class="sidebar-divider"></div>

                    <p class="nav-section-label">Groups</p>
                    <nav id="sidebar-groups"></nav>
                </div>

                <div class="sidebar-footer">
                    <button class="sidebar-btn" onclick="goAdmin()">🔑 Admin</button>
                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="menu-main">
                <!-- Fixed header -->
                <div class="menu-topbar">
                    <div>
                        <h1 class="menu-title" id="menu-title-display">All Drinks</h1>
                        <p class="menu-sub" id="menu-count">Loading drinks...</p>
                    </div>
                </div>

                <div id="menu-snap-container" class="menu-snap-container">
                    <div id="menu-pages" class="menu-pages"></div>
                </div>

                <div id="page-indicator" class="page-indicator" aria-hidden="true"></div>
            </main>

        </div>
    </div>

    <!-- ══════════════════════════════════════════════
         PROCESSING SCREEN
    ══════════════════════════════════════════════  -->
    <div id="processing-screen" class="screen">
        <div class="processing-center">
            <div class="pour-animation">
                <div class="pour-drop"></div>
                <div class="glass-fill"></div>
            </div>
            <h2 class="proc-title">Preparing Your Drink</h2>
            <p class="proc-sub">Please wait while we mix your order...</p>
            <div class="proc-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════
         EXTRAS & PAYMENT MODAL
    ══════════════════════════════════════════════  -->
    <div id="payment-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 2rem; border-radius: 12px; color: black; text-align: left; max-width: 400px; width: 90%;">
            <h2 style="margin-top: 0; text-align: center;">Select Extras (Optional)</h2>
            <div id="extras-container" style="margin: 1.5rem 0; max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem;">
                <!-- Extras checkboxes injected here -->
            </div>
            <hr style="border: none; border-top: 1px dashed #ccc; margin: 1rem 0;">
            <div style="display: flex; justify-content: space-between; font-size: 1.1rem;">
                <span>Drink Price:</span>
                <span id="modal-drink-price">₹0</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 1.1rem; color: #666;">
                <span>Extras Total:</span>
                <span id="modal-extras-total">₹0</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: bold; margin-top: 0.5rem;">
                <span>TOTAL:</span>
                <span id="modal-total-price">₹0</span>
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                <button onclick="cancelPayment()" style="padding: 0.8rem 1.5rem; border: none; border-radius: 8px; background: #ccc; cursor: pointer; font-size: 1rem;">Cancel</button>
                <button id="confirm-payment-btn" style="padding: 0.8rem 1.5rem; border: none; border-radius: 8px; background: #4caf50; color: white; cursor: pointer; font-size: 1rem; font-weight: bold;">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <script src="/static/js/payment_gateway.js"></script>
    <script src="/static/js/app.js?v=10"></script>
</body>
</html>
