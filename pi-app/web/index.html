<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f4f6fb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Mixion Kiosk</title>
    <link rel="stylesheet" href="/static/css/style.css?v=11">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ══════════════════════════════════════════════
         SPLASH SCREEN
    ══════════════════════════════════════════════  -->
    <div id="splash-screen" class="screen active">
        <div class="overlay"></div>
        <video src="/static/images/promo.mp4" class="bg-media" autoplay loop muted playsinline></video>
        <div class="splash-content">
            <div class="splash-logo">MIXION</div>
            <p class="splash-sub">TOUCH ANYWHERE TO ORDER</p>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════
         MENU SCREEN
    ══════════════════════════════════════════════  -->
    <div id="menu-screen" class="screen">
        <div class="menu-layout">

            <!-- FIXED SIDEBAR -->
            <aside class="sidebar">
                <div class="sidebar-brand">🍹 Mixion</div>

                <!-- Scrollable nav inside sidebar -->
                <div class="sidebar-scroll">
                    <p class="nav-section-label">Category</p>
                    <nav id="sidebar-categories" aria-label="Category Navigation"></nav>

                    <div class="sidebar-divider"></div>

                    <p class="nav-section-label">Groups</p>
                    <nav id="sidebar-groups" aria-label="Group Navigation"></nav>
                </div>

                <div class="sidebar-footer">
                    <button class="sidebar-btn" onclick="goAdmin()">🔑 Admin</button>
                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="menu-main">
                <!-- Fixed header -->
                <div class="menu-topbar">
                    <div>
                        <h1 class="menu-title" id="menu-title-display">All Drinks</h1>
                        <p class="menu-sub" id="menu-count">Loading drinks...</p>
                    </div>
                </div>

                <div id="menu-snap-container" class="menu-snap-container">
                    <div id="menu-pages" class="menu-pages"></div>
                </div>

                <div id="page-indicator" class="page-indicator" aria-hidden="true"></div>
            </main>

        </div>
    </div>

    <!-- ══════════════════════════════════════════════
         PROCESSING SCREEN
    ══════════════════════════════════════════════  -->
    <div id="processing-screen" class="screen">
        <div class="processing-center">
            <div class="pour-animation">
                <div class="pour-drop"></div>
                <div class="glass-fill"></div>
            </div>
            <h2 class="proc-title">Preparing Your Drink</h2>
            <p class="proc-sub">Please wait while we mix your order...</p>
            <div class="proc-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════
         EXTRAS & PAYMENT MODAL
    ══════════════════════════════════════════════  -->
    <div id="payment-modal" class="payment-modal-overlay touch-manipulation" style="display: none;">
        <div class="payment-modal-content">
            <h2>Select Extras (Optional)</h2>
            <div id="extras-container" class="payment-modal-extras">
                <!-- Extras checkboxes injected here -->
            </div>
            <hr class="payment-modal-divider">
            <div class="payment-modal-row">
                <span>Drink Price:</span>
                <span id="modal-drink-price">₹0</span>
            </div>
            <div class="payment-modal-row text-muted">
                <span>Extras Total:</span>
                <span id="modal-extras-total">₹0</span>
            </div>
            <div class="payment-modal-row total">
                <span>TOTAL:</span>
                <span id="modal-total-price">₹0</span>
            </div>
            
            <div class="payment-modal-actions">
                <button class="btn-cancel" onclick="cancelPayment()">Cancel</button>
                <button id="confirm-payment-btn" class="btn-confirm">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <script src="/static/js/payment_gateway.js"></script>
    <script src="/static/js/app.js?v=10"></script>
</body>
</html>
